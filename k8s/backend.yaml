apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: traffic-light
data:
  ELASTICSEARCH_URI: "http://elasticsearch:9200"
  DATA_FILE_PATH: "/app/data/전국신호등표준데이터.json"
  CORS_ALLOWED_ORIGINS: "http://localhost:30000"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: traffic-light
type: Opaque
stringData:
  ADMIN_API_KEY: "k8s-admin-key-change-in-production"
  SERVICE_KEY: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-application-yml
  namespace: traffic-light
data:
  application.yml: |
    spring:
      elasticsearch:
        uris: http://elasticsearch:9200
    server:
      port: 8080
    trafficlight:
      data-file: /app/data/전국신호등표준데이터.json
      index-name: traffic-lights
      bulk-size: 1000
      api:
        base-url: https://api.data.go.kr/openapi/tn_pubr_public_traffic_light_api
        service-key: ${SERVICE_KEY:}
      security:
        admin-key: ${ADMIN_API_KEY:dev-admin-key-change-in-production}
      cors:
        allowed-origins: http://localhost:30000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: traffic-light
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: traffic-light-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          volumeMounts:
            - name: app-config
              mountPath: /app/config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/app/config/"
          readinessProbe:
            httpGet:
              path: /api/index/status
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/index/status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: app-config
          configMap:
            name: backend-application-yml
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: traffic-light
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-nodeport
  namespace: traffic-light
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
